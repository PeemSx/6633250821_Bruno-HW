info:
  name: orders-valid get order
  type: http
  seq: 6

http:
  method: GET
  url: "{{baseUrl}}/orders/{{lastOrderId}}"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        // Assert
        test("get valid order", function () {
          const body = res.getBody();
          expect(res.getStatus()).to.equal(200);
          expect(body.orderId).to.equal(bru.getEnvVar("lastOrderId"));
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
