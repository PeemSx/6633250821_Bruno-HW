info:
  name: orders-out of stock
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/orders"
  body:
    type: json
    data: |2-
        {
          "itemId": 1,
          "quantity": 1
        }
  auth:
    type: bearer
    token: "{{accessToken}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        test("order item that's out of stock", function () {
          const body = res.getBody();
          expect(res.getStatus()).to.equal(400);
          expect(body.error).to.equal("Out of stock");
        });

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
